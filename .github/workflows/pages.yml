name: Deploy dashboard to GitHub Pages

# Publishes the site whenever main is updated, by force-pushing the assembled
# static files to the gh-pages branch. GitHub Pages serves that branch and
# auto-enabled itself when gh-pages was first pushed, so no repository
# settings are required. All data files are pre-built and committed (data/),
# so no R, Python, or build step runs here.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site (exclude source RDS files from the deploy)
        run: |
          mkdir _site
          cp index.html .nojekyll _site/
          cp -r css js data _site/

      - name: Publish to gh-pages branch
        run: |
          cd _site
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy dashboard from ${GITHUB_SHA}"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
