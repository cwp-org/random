name: Deploy dashboard to GitHub Pages

# Publishes the repository root as a static GitHub Pages site whenever main
# is updated. All data files are pre-built and committed (data/), so no R,
# Python, or build step runs here — the workflow only uploads static files.
#
# One-time repository setting: Settings -> Pages -> Source = "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages (auto-enables Pages on first run)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Assemble site (exclude source RDS files from the deploy)
        run: |
          mkdir _site
          cp index.html .nojekyll _site/
          cp -r css js data _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
